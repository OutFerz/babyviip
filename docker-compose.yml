services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: dockerfile
    # Si estás en Windows, este repo suele montarse con saltos de línea CRLF.
    # Como hacemos bind-mount `.:/app`, el contenedor ejecuta el `entrypoint.sh`
    # del host y `sh` puede fallar con:
    #   /app/entrypoint.sh: 5: set: Illegal option -
    # (en realidad es `set -e\r`). Esto normaliza CRLF -> LF antes de ejecutar.
    command: sh -c "python -c \"from pathlib import Path; p=Path('/app/entrypoint.sh'); p.write_bytes(p.read_bytes().replace(b'\\r\\n', b'\\n'))\" && sh /app/entrypoint.sh"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
