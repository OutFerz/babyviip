{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva conversación — Babyviip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/site_nav.css' %}">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>
    {% include 'partials/site_nav.html' %}

    <main class="container py-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <div>
                <h1 class="h3 mb-1">Nueva conversación</h1>
                <p class="text-muted mb-0">Escríbenos tu consulta (tallas, stock, reposición, pedidos).</p>
            </div>
            <a class="btn btn-outline-secondary" href="{% url 'mis_conversaciones' %}">Volver</a>
        </div>

        <div class="card p-3 p-md-4 rounded-4 border">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Asunto (opcional)</label>
                    <input class="form-control" name="asunto" maxlength="120" placeholder="Ej: Stock Body 3-6M, duda de talla…">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea class="form-control" name="contenido" rows="4" required placeholder="Escribe tu mensaje…"></textarea>
                </div>
                <button class="btn btn-baby-pink" type="submit">Enviar</button>
            </form>
        </div>
    </main>
</body>
</html>
